name: deploy-book

on:
  push:
    branches:
    - main

# Grant GITHUB_TOKEN the permissions required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build the book HTML with the MyST engine (Jupyter Book 2)
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --frozen

    - name: Build the book
      run: uv run jupyter book build --html
      working-directory: ./src
      env:
        BASE_URL: /quantum-learning-roadmap

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./src/_build/html

  # Deploy the built HTML to GitHub Pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Guard against a hung Pages deployment (e.g. platform-side sync stalls)
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
